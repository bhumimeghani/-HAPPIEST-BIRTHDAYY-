<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise for You! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .container {
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        /* The Gift Box */
        .gift-container {
            width: 200px;
            height: 200px;
            position: relative;
            margin: 0 auto 30px auto;
            transition: transform 0.3s ease;
        }
        .gift-container:hover {
            transform: scale(1.05);
        }
        .gift-box {
            width: 100%;
            height: 100%;
            background: #ff4757;
            position: absolute;
            bottom: 0;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: #ffa502;
            left: 50%;
            transform: translateX(-50%);
        }
        .gift-lid {
            width: 220px;
            height: 50px;
            background: #ff4757;
            position: absolute;
            top: -40px;
            left: -10px;
            border-radius: 5px;
            transition: all 0.5s ease-in-out;
            z-index: 2;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        .gift-lid::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: #ffa502;
            left: 50%;
            transform: translateX(-50%);
        }
        /* Bow */
        .bow {
            width: 50px;
            height: 50px;
            background: #ffa502;
            border-radius: 50%;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* Hidden Message */
        .message-container {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 90vw;
            max-width: 500px;
        }
        h1 {
            font-size: 3rem;
            color: #ff7f50;
            text-shadow: 2px 2px 10px rgba(255,127,80,0.5);
            margin-bottom: 15px;
        }
        p {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #dfe4ea;
        }
        .instruction {
            font-size: 1.2rem;
            color: #ffa502;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* Open State Animations */
        .container.open .gift-lid {
            transform: translateY(-120px) rotate(-20deg) translateX(-50px);
            opacity: 0;
        }
        .container.open .gift-box {
            transform: translateY(200px);
            opacity: 0;
            transition: all 0.5s ease-in-out;
        }
        .container.open .instruction {
            display: none;
        }
        .container.open .message-container {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        /* Confetti Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
